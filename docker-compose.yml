services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY:?Set TMDB_API_KEY in .env}
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in .env}
      PORT: 5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      BACKEND_URL: ${BACKEND_URL_DOCKER:-http://backend:5000}
      PORT: 8501
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8501:8501"
    restart: unless-stopped
